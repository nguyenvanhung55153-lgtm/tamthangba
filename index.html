<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1,viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#fde8f5" />
    <title>Chúc Mừng 8/3 – Lớp 11A5 💖</title>
    <meta name="description" content="Website chúc mừng 8/3 dành riêng cho các cô gái lớp 11A5." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Dancing+Script:wght@600;700&display=swap"
        rel="stylesheet" />
    <style>
        /* ═══ RESET ═══ */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            height: -webkit-fill-available;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        body {
            font-family: 'Baloo 2', cursive;
            background: radial-gradient(ellipse 120% 100% at 50% 0%, #fde8f5 0%, #fef3fb 45%, #f5f0ff 80%, #fef9ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: 100svh;
            min-height: 100dvh;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

        /* ═══ CANVAS ═══ */
        #bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        /* ═══ ALREADY-OPENED SCREEN ═══ */
        #alreadyScreen {
            position: fixed;
            inset: 0;
            z-index: 600;
            display: none;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse 120% 100% at 50% 0%, #fde8f5, #fef3fb 50%, #f5f0ff);
            flex-direction: column;
            gap: 1.1rem;
            text-align: center;
            padding: calc(1.5rem + env(safe-area-inset-top)) calc(1.5rem + env(safe-area-inset-right)) calc(1.5rem + env(safe-area-inset-bottom)) calc(1.5rem + env(safe-area-inset-left));
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        #alreadyScreen.show {
            display: flex;
            animation: fadeIn .9s ease both;
        }

        .al-icon {
            font-size: clamp(3.5rem, 13vw, 5.8rem);
            animation: floatGently 3.5s ease-in-out infinite;
        }

        .al-title {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.7rem, 6.5vw, 2.8rem);
            font-weight: 700;
            color: #be185d;
            line-height: 1.2;
        }

        .al-sub {
            font-size: clamp(1rem, 3.4vw, 1.15rem);
            color: #7c3aed;
            font-weight: 500;
            max-width: 360px;
            line-height: 1.7;
        }

        .al-wish {
            background: rgba(255, 255, 255, .82);
            border: 2px solid rgba(249, 168, 212, .55);
            border-radius: 22px;
            padding: 1.1rem 1.7rem;
            font-size: clamp(.95rem, 3.2vw, 1.1rem);
            color: #5b21b6;
            font-weight: 500;
            line-height: 1.8;
            max-width: 370px;
            box-shadow: 0 8px 32px #f472b618;
            backdrop-filter: blur(10px);
        }

        /* ═══ ENV WRAP ═══ */
        #envWrap {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(.8rem, 3vw, 1.3rem);
        }

        .env-label {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.05rem, 4.5vw, 2.1rem);
            font-weight: 700;
            color: #db2777;
            text-shadow: 0 2px 14px #fbcfe860;
            letter-spacing: .03em;
            animation: dropIn .8s cubic-bezier(.34, 1.56, .64, 1) both;
            white-space: normal;
            text-align: center;
            max-width: 92vw;
            line-height: 1.35;
        }

        /* ═══ ENVELOPE ═══ */
        .env-scene {
            perspective: 1200px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            animation: floatBob 5s ease-in-out infinite;
            transition: filter .25s;
            user-select: none;
            touch-action: manipulation;
            -webkit-user-select: none;
        }

        .env-scene:hover {
            filter: drop-shadow(0 28px 52px #e879c068);
        }

        .env-scene.opened {
            animation: none;
            cursor: default;
        }

        .env-box {
            position: relative;
            width: min(540px, 90vw);
            height: min(375px, 65vw);
        }

        /* Outer envelope body */
        .env-body {
            position: absolute;
            inset: 0;
            /* Soft cream-pink — easy on eyes */
            background: linear-gradient(160deg, #fff8fd 0%, #ffe8f7 55%, #ffd8f0 100%);
            border-radius: 20px;
            box-shadow:
                0 24px 70px rgba(244, 114, 182, .38),
                0 6px 22px rgba(0, 0, 0, .08),
                inset 0 1.5px 0 rgba(255, 255, 255, .9);
            overflow: hidden;
        }

        /* Bottom V */
        .env-body::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            border-left: calc(min(540px, 90vw)/2) solid #f5abd8;
            border-right: calc(min(540px, 90vw)/2) solid #f5abd8;
            border-top: calc(min(375px, 65vw)*.44) solid transparent;
        }

        /* Side folds */
        .env-left,
        .env-right {
            position: absolute;
            top: 0;
            height: 100%;
        }

        .env-left {
            left: 0;
            border-style: solid;
            border-width: calc(min(375px, 65vw)/2) 0 calc(min(375px, 65vw)/2) calc(min(540px, 90vw)*.35);
            border-color: transparent transparent transparent #f9bde3;
        }

        .env-right {
            right: 0;
            border-style: solid;
            border-width: calc(min(375px, 65vw)/2) calc(min(540px, 90vw)*.35) calc(min(375px, 65vw)/2) 0;
            border-color: transparent #f9bde3 transparent transparent;
        }

        /* ─── FLAP ─── */
        .env-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            transform-style: preserve-3d;
            transform-origin: top center;
            transform: rotateX(0deg);
            transition: transform .72s cubic-bezier(.4, 0, .2, 1);
            z-index: 6;
        }

        .env-flap svg {
            display: block;
            width: 100%;
        }

        .env-scene.opened .env-flap {
            transform: rotateX(-180deg);
        }

        /* ─── SEAL ─── */
        .seal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(2.5rem, 8vw, 4rem);
            z-index: 7;
            filter: drop-shadow(0 4px 12px #c2185b55);
            animation: sealBeat 1.8s ease-in-out infinite;
            transition: transform .4s ease, opacity .4s ease;
            pointer-events: none;
        }

        .env-scene.opened .seal {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0) rotate(60deg);
        }

        /* ─── PEEKING LETTER ─── */
        .env-letter {
            position: absolute;
            bottom: 9%;
            left: 50%;
            width: 74%;
            transform: translateX(-50%) translateY(2px);
            z-index: 4;
            transition: transform .65s .1s cubic-bezier(.22, 1, .36, 1);
            pointer-events: none;
        }

        .env-letter-inner {
            background: linear-gradient(155deg, #fffcfe, #fff0fb);
            border-radius: 11px;
            height: calc(min(375px, 65vw)*.31);
            border: 2px solid rgba(249, 168, 212, .7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.05rem, 3.6vw, 1.5rem);
            color: #ec4899;
            letter-spacing: .08em;
            font-weight: 700;
            box-shadow: 0 3px 16px rgba(244, 114, 182, .15);
        }

        .env-scene.opened .env-letter {
            transform: translateX(-50%) translateY(-70%);
        }

        /* ─── TAP HINT ─── */
        .tap-hint {
            font-size: clamp(.82rem, 3vw, 1.05rem);
            color: #be185d;
            letter-spacing: .04em;
            font-weight: 600;
            animation: hintPop 2.3s ease-in-out infinite;
            transition: opacity .4s;
            user-select: none;
            -webkit-user-select: none;
            white-space: normal;
            text-align: center;
            max-width: 90vw;
            line-height: 1.6;
        }

        .tap-hint .bounce {
            display: inline-block;
            animation: hintBounce 1.1s ease-in-out infinite;
        }

        /* ═══════════════════════════════
   WISH OVERLAY
═══════════════════════════════ */
        .wish-overlay {
            position: fixed;
            inset: 0;
            z-index: 400;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: calc(env(safe-area-inset-top) + clamp(1rem, 5vw, 2rem)) calc(env(safe-area-inset-right) + clamp(.8rem, 3vw, 1.4rem)) calc(env(safe-area-inset-bottom) + clamp(.8rem, 3vw, 1.4rem)) calc(env(safe-area-inset-left) + clamp(.8rem, 3vw, 1.4rem));
            pointer-events: none;
            opacity: 0;
            transition: opacity .1s;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .wish-overlay.show {
            pointer-events: auto;
            opacity: 1;
        }

        /* Soft backdrop */
        .wish-backdrop {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(253, 232, 245, .85), rgba(245, 240, 255, .85));
            backdrop-filter: blur(22px) saturate(1.4);
            -webkit-backdrop-filter: blur(22px) saturate(1.4);
            opacity: 0;
            transition: opacity .5s ease;
        }

        .wish-overlay.show .wish-backdrop {
            opacity: 1;
        }

        /* ─── CARD ─── */
        .wish-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 490px;
            margin: auto 0;
            background: linear-gradient(160deg, rgba(255, 255, 255, .97), rgba(255, 240, 252, .99));
            border-radius: 26px;
            padding: clamp(1.9rem, 5.5vw, 2.8rem) clamp(1.3rem, 4.5vw, 2.4rem) clamp(1.5rem, 5vw, 2.4rem);
            box-shadow:
                0 28px 70px rgba(232, 121, 192, .35),
                0 8px 28px rgba(0, 0, 0, .09),
                inset 0 1.5px 0 rgba(255, 255, 255, .95);
            border: 2px solid rgba(249, 168, 212, .5);
            transform: translateY(80px) scale(.84) rotateX(8deg);
            opacity: 0;
            transition:
                transform .62s .15s cubic-bezier(.34, 1.56, .64, 1),
                opacity .48s .15s ease;
            text-align: center;
            overflow: visible;
            transform-style: preserve-3d;
        }

        .wish-overlay.show .wish-card {
            transform: translateY(0) scale(1) rotateX(0deg);
            opacity: 1;
        }



        /* Ribbon tag */
        .ribbon {
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(90deg, #f9a8d4, #e879c0, #a855f7);
            color: #fff;
            font-family: 'Dancing Script', cursive;
            font-size: clamp(.82rem, 2.5vw, .97rem);
            font-weight: 700;
            padding: .34rem 1.6rem;
            border-radius: 100px;
            box-shadow: 0 4px 16px rgba(232, 121, 192, .45);
            white-space: nowrap;
            letter-spacing: .07em;
        }

        /* Date display */
        .date-badge {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(2.5rem, 9vw, 4rem);
            font-weight: 700;
            background: linear-gradient(135deg, #f472b6, #c026d3, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: .9rem;
            display: block;
            filter: drop-shadow(0 2px 8px rgba(244, 114, 182, .4));
            animation: badgeGlow 2.8s ease-in-out infinite;
            line-height: 1.1;
        }

        /* ─── WISH TEXT (big, cute, readable) ─── */
        .wish-body {
            font-size: clamp(1.1rem, 3.8vw, 1.35rem);
            color: #5b21b6;
            line-height: 2;
            font-weight: 600;
            min-height: 4em;
            transition: opacity .28s;
            letter-spacing: .01em;
        }

        .wish-divider {
            margin: 1.15rem auto;
            width: 60px;
            height: 3.5px;
            background: linear-gradient(90deg, #f9a8d4, #a855f7, #f9a8d4);
            border-radius: 10px;
        }

        .wish-sig {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.05rem, 3.8vw, 1.3rem);
            color: #be185d;
            font-weight: 700;
            margin-top: .5rem;
        }

        .wish-actions {
            display: flex;
            gap: .8rem;
            justify-content: center;
            margin-top: 1.5rem;
        }

        .btn {
            padding: .7rem 1.7rem;
            border: none;
            border-radius: 100px;
            font-family: 'Baloo 2', cursive;
            font-weight: 700;
            font-size: clamp(.88rem, 2.6vw, 1rem);
            cursor: pointer;
            transition: transform .18s, box-shadow .18s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: scale(.93) !important;
        }

        .btn-close {
            background: linear-gradient(135deg, #f9a8d4, #e879c0);
            color: #fff;
            box-shadow: 0 5px 22px rgba(232, 121, 192, .5);
            letter-spacing: .03em;
        }

        .btn-close:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(232, 121, 192, .7);
        }

        /* ─── SPARKLE DOTS decorating the card ─── */
        .card-deco {
            position: absolute;
            pointer-events: none;
            font-size: 1.2rem;
            animation: sparkleFloat 3s ease-in-out infinite;
        }

        .card-deco:nth-child(1) {
            top: -10px;
            left: 18px;
            animation-delay: 0s;
        }

        .card-deco:nth-child(2) {
            top: -10px;
            right: 18px;
            animation-delay: .5s;
        }

        .card-deco:nth-child(3) {
            bottom: 16px;
            left: 12px;
            animation-delay: 1s;
        }

        .card-deco:nth-child(4) {
            bottom: 16px;
            right: 12px;
            animation-delay: 1.5s;
        }

        /* ═══ KEYFRAMES ═══ */
        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        @keyframes dropIn {
            from {
                opacity: 0;
                transform: translateY(-32px) scale(.9);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        @keyframes floatBob {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        @keyframes floatGently {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes sealBeat {

            0%,
            55%,
            100% {
                transform: translate(-50%, -50%) scale(1);
            }

            14% {
                transform: translate(-50%, -50%) scale(1.3);
            }

            28% {
                transform: translate(-50%, -50%) scale(1.06);
            }

            42% {
                transform: translate(-50%, -50%) scale(1.2);
            }
        }

        @keyframes hintPop {

            0%,
            100% {
                opacity: .6;
            }

            50% {
                opacity: 1;
            }
        }

        @keyframes hintBounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-7px);
            }
        }

        @keyframes badgeGlow {

            0%,
            100% {
                filter: drop-shadow(0 2px 8px rgba(244, 114, 182, .4));
            }

            50% {
                filter: drop-shadow(0 4px 20px rgba(124, 58, 237, .55));
            }
        }

        /* ─── reduced motion: disable heavy animations ─── */
        @media (prefers-reduced-motion: reduce) {
            .env-scene {
                animation: none !important;
            }

            .seal {
                animation: none !important;
            }

            .card-deco {
                animation: none !important;
            }

            .al-icon {
                animation: none !important;
            }

            .tap-hint {
                animation: none !important;
            }
        }

        @keyframes sparkleFloat {

            0%,
            100% {
                transform: translateY(0) scale(1);
                opacity: .8;
            }

            50% {
                transform: translateY(-5px) scale(1.2);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <canvas id="bg"></canvas>

    <!-- Already opened -->
    <div id="alreadyScreen">
        <div class="al-icon">💌</div>
        <p class="al-title">Bạn đã mở thư rồi nhé! 🌸</p>
        <p class="al-sub">Mỗi người chỉ được mở một lần thôi 💕<br />Lời chúc dành riêng cho bạn là:</p>
        <div class="al-wish" id="alreadyWishEl"></div>
    </div>

    <!-- Envelope -->
    <div id="envWrap">
        <p class="env-label">💌 Lớp 11A5 · Chúc Mừng 8/3 💌</p>

        <div class="env-scene" id="envScene" role="button" tabindex="0" aria-label="Bấm để mở phong thư">
            <div class="env-box">
                <div class="env-body">
                    <div class="env-left"></div>
                    <div class="env-right"></div>

                    <!-- flap -->
                    <div class="env-flap">
                        <svg viewBox="0 0 540 210" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
                            <defs>
                                <linearGradient id="fG" x1="0" y1="0" x2="1" y2="1">
                                    <stop offset="0%" stop-color="#fba8d8" />
                                    <stop offset="50%" stop-color="#e879c0" />
                                    <stop offset="100%" stop-color="#9333ea" />
                                </linearGradient>
                            </defs>
                            <polygon points="0,0 540,0 270,198" fill="url(#fG)" opacity=".88" />
                            <polygon points="0,0 540,0 270,184" fill="#fce4f7" opacity=".5" />
                        </svg>
                    </div>

                    <!-- seal -->
                    <div class="seal">💝</div>

                    <!-- peeking letter -->
                    <div class="env-letter">
                        <div class="env-letter-inner">🌸 &nbsp; 8 / 3 &nbsp; 🌸</div>
                    </div>
                </div>
            </div>
        </div>

        <p class="tap-hint" id="tapHint"><span class="bounce">💌</span>&nbsp; Bấm vào để mở thư yêu thương!</p>
    </div>

    <!-- Wish overlay -->
    <div class="wish-overlay" id="wishOverlay" aria-modal="true" role="dialog">
        <div class="wish-backdrop"></div>
        <div class="wish-card" id="wishCard">
            <!-- corner sparkles -->
            <span class="card-deco">✨</span>
            <span class="card-deco">🌸</span>
            <span class="card-deco">💕</span>
            <span class="card-deco">✨</span>

            <div class="ribbon">🎀 Lớp 11A5 &nbsp;·&nbsp; 8 / 3 / 2026 🎀</div>
            <span class="date-badge">8 · 3</span>
            <p class="wish-body" id="wishBodyEl"></p>
            <div class="wish-divider"></div>
            <p class="wish-sig">— Từ cả lớp 11A5 với tất cả yêu thương 💕 —</p>
            <div class="wish-actions">
                <button class="btn btn-close" id="btnClose">💖 Đóng thư lại</button>
            </div>
        </div>
    </div>

    <script>
        /* ── WISHES ── */
        const WISHES = [
            "Chúc bạn 8/3 luôn xinh đẹp, vui vẻ và hạnh phúc mỗi ngày 🌷",
            "Mong rằng nụ cười của bạn sẽ luôn rạng rỡ như hôm nay 💕",
            "Chúc bạn luôn đạt được những điều mình mong muốn 🎀",
            "Hy vọng bạn sẽ luôn mạnh mẽ và tự tin theo đuổi ước mơ 🌸",
            "Chúc bạn học giỏi hơn nữa và luôn gặp may mắn 🌟",
            "Mong bạn có một ngày 8/3 thật ý nghĩa và ngập tràn yêu thương 💖",
            "Chúc bạn luôn là phiên bản tuyệt vời nhất của chính mình 🌼",
            "Hy vọng mọi điều tốt đẹp nhất sẽ đến với bạn 💝",
            "Chúc bạn luôn được yêu thương và trân trọng 🌺",
            "Mong rằng tuổi trẻ của bạn sẽ thật rực rỡ 🌻",
            "Chúc bạn lúc nào cũng cười thật tươi 😊",
            "Hy vọng bạn sẽ có thật nhiều niềm vui trong cuộc sống 🎉",
            "Chúc bạn luôn bình an và hạnh phúc 💗",
            "Mong rằng mọi dự định của bạn đều thành công 🌷",
            "Chúc bạn luôn tỏa sáng theo cách riêng của mình ✨",
            "Hy vọng bạn sẽ luôn tự tin và yêu bản thân nhiều hơn 💕",
            "Chúc bạn có một ngày 8/3 thật đặc biệt 🎀",
            "Mong bạn luôn gặp những điều tốt đẹp nhất 🌸",
            "Chúc bạn luôn tràn đầy năng lượng tích cực 🌟",
            "Hy vọng bạn sẽ đạt được mọi ước mơ của mình 💖",
            "Chúc bạn luôn được bao quanh bởi những người yêu thương 💝",
            "Mong bạn mãi giữ được sự hồn nhiên và đáng yêu 🌼",
            "Chúc bạn thành công trong học tập và cuộc sống 🌺",
            "Hy vọng bạn sẽ luôn cảm thấy mình thật quý giá 🌻",
            "Chúc bạn một ngày 8/3 thật trọn vẹn và hạnh phúc 💗"
        ];

        /* ── 5-OPEN LIMIT ── */
        const LS_KEY = 'opened_83_11a5_2026';
        const LS_CNT = 'opened_83_11a5_cnt';
        const MAX_OPEN = 5;

        let openCount = parseInt(localStorage.getItem(LS_CNT) || '0', 10);
        const savedWish = localStorage.getItem(LS_KEY);

        if (openCount >= MAX_OPEN && savedWish) {
            document.getElementById('alreadyWishEl').textContent = savedWish;
            document.getElementById('alreadyScreen').classList.add('show');
            document.getElementById('envWrap').style.display = 'none';
        }

        /* ── ENVELOPE LOGIC ── */
        const scene = document.getElementById('envScene');
        const overlay = document.getElementById('wishOverlay');
        const bodyEl = document.getElementById('wishBodyEl');
        const tapHint = document.getElementById('tapHint');
        let opened = false;

        function openEnvelope() {
            if (opened) return;
            opened = true;
            scene.classList.add('opened');
            // hide hint while card animates; restored below if opens remain

            openCount++;
            localStorage.setItem(LS_CNT, openCount);
            const wish = WISHES[Math.floor(Math.random() * WISHES.length)];
            localStorage.setItem(LS_KEY, wish);

            // Update hint with remaining count after this open
            const rem = MAX_OPEN - openCount;
            if (rem > 0) {
                tapHint.style.cssText = 'opacity:0;pointer-events:none;';
            }

            // Step 1: flap opens (0-700ms)
            // Step 2: letter peeks up (starts at 100ms via CSS transition)
            // Step 3: confetti burst + overlay at 600ms
            setTimeout(() => { burst(); showWish(wish, openCount); }, 600);
        }

        function showWish(text, count) {
            bodyEl.textContent = text;
            bodyEl.style.opacity = '0';

            // Show remaining opens info in the card sig line
            const rem = MAX_OPEN - count;
            const sigEl = document.querySelector('.wish-sig');
            sigEl.innerHTML = rem > 0
                ? `— Từ cả lớp 11A5 với tất cả yêu thương 💕 —<br/><small style="font-size:.75em;color:#9333ea;font-family:'Baloo 2',cursive;">Bạn còn <strong>${rem}</strong> lần mở thư nữa 🎀</small>`
                : `— Từ cả lớp 11A5 với tất cả yêu thương 💕 —<br/><small style="font-size:.75em;color:#be185d;font-family:'Baloo 2',cursive;">Đây là lần cuối bạn mở thư rồi nhé 🌸</small>`;

            overlay.classList.add('show');
            setTimeout(() => { bodyEl.style.transition = 'opacity .45s'; bodyEl.style.opacity = '1'; }, 240);
        }

        function closeOverlay() {
            const card = document.getElementById('wishCard');
            card.style.transition = 'transform .4s ease,opacity .32s ease';
            card.style.transform = 'translateY(60px) scale(.86) rotateX(6deg)';
            card.style.opacity = '0';
            setTimeout(() => {
                overlay.classList.remove('show');
                card.style.cssText = '';
            }, 420);
        }

        // Update tap hint before first open
        (function updateHint() {
            if (openCount >= MAX_OPEN) return;
            const rem = MAX_OPEN - openCount;
            tapHint.innerHTML = `<span class="bounce">💌</span>&nbsp; Bấm để mở thư! &nbsp;<span style="background:rgba(249,168,212,.25);border-radius:30px;padding:.15rem .6rem;font-size:.88em;">${rem} lần còn lại</span>`;
        })();

        scene.addEventListener('click', () => {
            if (openCount >= MAX_OPEN) { return; }
            openEnvelope();
        });
        scene.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openEnvelope(); });
        document.getElementById('btnClose').addEventListener('click', () => {
            closeOverlay();
            // After closing, if still have opens remaining, re-enable envelope
            if (openCount < MAX_OPEN) {
                setTimeout(() => {
                    opened = false;
                    scene.classList.remove('opened');
                    const rem2 = MAX_OPEN - openCount;
                    tapHint.innerHTML = `<span class="bounce">💌</span>&nbsp; Bấm để mở thư! &nbsp;<span style="background:rgba(249,168,212,.25);border-radius:30px;padding:.15rem .6rem;font-size:.88em;">${rem2} lần còn lại</span>`;
                    tapHint.style.cssText = '';
                }, 450);
            } else {
                // Used all 5 — show locked screen after short delay
                setTimeout(() => {
                    overlay.classList.remove('show');
                    document.getElementById('alreadyWishEl').textContent = localStorage.getItem(LS_KEY);
                    document.getElementById('alreadyScreen').classList.add('show');
                    document.getElementById('envWrap').style.display = 'none';
                }, 500);
            }
        });
        overlay.querySelector('.wish-backdrop').addEventListener('click', () => {
            closeOverlay();
            if (openCount < MAX_OPEN) {
                setTimeout(() => {
                    opened = false;
                    scene.classList.remove('opened');
                    const rem2 = MAX_OPEN - openCount;
                    tapHint.innerHTML = `<span class="bounce">💌</span>&nbsp; Bấm để mở thư! &nbsp;<span style="background:rgba(249,168,212,.25);border-radius:30px;padding:.15rem .6rem;font-size:.88em;">${rem2} lần còn lại</span>`;
                    tapHint.style.cssText = '';
                }, 450);
            } else {
                setTimeout(() => {
                    overlay.classList.remove('show');
                    document.getElementById('alreadyWishEl').textContent = localStorage.getItem(LS_KEY);
                    document.getElementById('alreadyScreen').classList.add('show');
                    document.getElementById('envWrap').style.display = 'none';
                }, 500);
            }
        });

        /* ── PARTICLES ── */
        const cv = document.getElementById('bg'), cx = cv.getContext('2d');
        let W, H, parts = [];
        function resize() { W = cv.width = innerWidth; H = cv.height = innerHeight; }
        resize(); addEventListener('resize', resize);

        const AMB = ['🌸', '🌷', '🌺', '💮', '✨', '💕', '💖', '🌸', '🌸', '🌷', '⭐'];
        const BURST = ['💖', '💕', '💗', '💝', '🌸', '✨', '🎀', '🎊', '🌷', '⭐'];

        class P {
            constructor(b = false) {
                this.b = b;
                if (b) {
                    this.x = W / 2 + (Math.random() - .5) * 120; this.y = H * .48;
                    this.vx = (Math.random() - .5) * 9; this.vy = -(Math.random() * 10 + 4);
                    this.life = Math.random() * 110 + 75;
                } else {
                    this.x = Math.random() * W; this.y = -35;
                    this.vx = (Math.random() - .5) * .95; this.vy = Math.random() * 1.2 + .3;
                    this.life = Infinity;
                }
                this.c = b ? BURST[Math.floor(Math.random() * BURST.length)] : AMB[Math.floor(Math.random() * AMB.length)];
                this.sz = Math.random() * 14 + 10; this.rot = Math.random() * 6.28;
                this.rv = (Math.random() - .5) * .065; this.a = 1; this.age = 0;
            }
            tick() {
                this.x += this.vx; this.y += this.vy; this.rot += this.rv; this.age++;
                if (this.b) { this.vy += .09; this.a = Math.max(0, 1 - this.age / this.life); }
                if (!this.b && this.y > H + 30) { this.x = Math.random() * W; this.y = -30; }
                return this.b && this.age >= this.life;
            }
            draw() {
                cx.save(); cx.globalAlpha = this.a;
                cx.translate(this.x, this.y); cx.rotate(this.rot);
                cx.font = this.sz + 'px serif'; cx.textAlign = 'center'; cx.textBaseline = 'middle';
                cx.fillText(this.c, 0, 0); cx.restore();
            }
        }

        function burst() { for (let i = 0; i < 50; i++)parts.push(new P(true)); }
        (function init() { const n = Math.max(20, Math.floor(W / 36)); for (let i = 0; i < n; i++) { const p = new P(); p.y = Math.random() * H; parts.push(p); } })();
        (function loop() { cx.clearRect(0, 0, W, H); parts = parts.filter(p => { const d = p.tick(); p.draw(); return !d; }); requestAnimationFrame(loop); })();
    </script>
</body>

</html>
