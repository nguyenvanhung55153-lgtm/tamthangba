<!DOCTYPE html>
<html lang="vi">

<head>

    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1,viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#fde8f5" />

    <meta name="description" content="Website chúc mừng 8/3 tích hợp AI nhận diện khuôn mặt." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Dancing+Script:wght@600;700&display=swap"
        rel="stylesheet" />
    <style>
        /* ═══ RESET ═══ */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            height: -webkit-fill-available;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: 'Baloo 2', cursive;
            background: radial-gradient(ellipse 120% 100% at 50% 0%, #fde8f5 0%, #fef3fb 45%, #f5f0ff 80%, #fef9ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: 100svh;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* ═══ CANVAS ═══ */
        #bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        /* ═══ AI UI ═══ */
        #aiStatus {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            padding: 10px 22px;
            border-radius: 30px;
            font-size: 0.95rem;
            color: #be185d;
            box-shadow: 0 8px 32px rgba(190, 24, 93, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.5);
            display: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            font-weight: 600;
        }

        #aiBtn {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: linear-gradient(135deg, #f472b6, #7c3aed);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 800;
            font-family: 'Baloo 2', cursive;
            font-size: 1.1rem;
            box-shadow: 0 10px 25px rgba(124, 58, 237, 0.4);
            cursor: pointer;
            transition: all 0.3s;
            animation: pulseBtn 2s infinite;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        #aiBtn:active {
            transform: translateX(-50%) scale(0.95);
        }

        @keyframes pulseBtn {
            0% {
                box-shadow: 0 0 0 0 rgba(244, 114, 182, 0.7);
            }

            70% {
                box-shadow: 0 0 0 15px rgba(244, 114, 182, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(244, 114, 182, 0);
            }
        }

        video#video {
            position: fixed;
            top: 0;
            left: 0;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        /* ═══ ENV WRAP ═══ */
        #envWrap {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.3rem;
        }

        .env-label {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.2rem, 5vw, 2.2rem);
            font-weight: 700;
            color: #db2777;
            text-shadow: 0 2px 14px #fbcfe860;
            text-align: center;
            max-width: 92vw;
            line-height: 1.35;
        }

        .env-scene {
            perspective: 1200px;
            cursor: pointer;
            animation: floatBob 5s ease-in-out infinite;
            transition: filter .25s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .env-scene.opened {
            animation: none;
            cursor: default;
        }

        .env-box {
            position: relative;
            width: min(540px, 90vw);
            height: min(375px, 65vw);
        }

        .env-body {
            position: absolute;
            inset: 0;
            background: linear-gradient(160deg, #fff8fd 0%, #ffe8f7 55%, #ffd8f0 100%);
            border-radius: 20px;
            box-shadow: 0 24px 70px rgba(244, 114, 182, .38), 0 6px 22px rgba(0, 0, 0, .08);
            overflow: hidden;
        }

        .env-body::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            border-left: calc(min(540px, 90vw)/2) solid #f5abd8;
            border-right: calc(min(540px, 90vw)/2) solid #f5abd8;
            border-top: calc(min(375px, 65vw)*.44) solid transparent;
        }

        .env-left,
        .env-right {
            position: absolute;
            top: 0;
            height: 100%;
            border-style: solid;
        }

        .env-left {
            left: 0;
            border-width: calc(min(375px, 65vw)/2) 0 calc(min(375px, 65vw)/2) calc(min(540px, 90vw)*.35);
            border-color: transparent transparent transparent #f9bde3;
        }

        .env-right {
            right: 0;
            border-width: calc(min(375px, 65vw)/2) calc(min(540px, 90vw)*.35) calc(min(375px, 65vw)/2) 0;
            border-color: transparent #f9bde3 transparent transparent;
        }

        .env-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            transform-origin: top center;
            transition: transform .72s cubic-bezier(.4, 0, .2, 1);
            z-index: 6;
        }

        .env-flap svg {
            display: block;
            width: 100%;
        }

        .env-scene.opened .env-flap {
            transform: rotateX(-180deg);
        }

        .seal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(2.5rem, 8vw, 4rem);
            z-index: 7;
            animation: sealBeat 1.8s infinite;
            transition: all .4s;
        }

        .env-scene.opened .seal {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0);
        }

        .env-letter {
            position: absolute;
            bottom: 9%;
            left: 50%;
            width: 74%;
            transform: translateX(-50%);
            z-index: 4;
            transition: transform .65s .1s cubic-bezier(.22, 1, .36, 1);
        }

        .env-letter-inner {
            background: linear-gradient(155deg, #fffcfe, #fff0fb);
            border-radius: 11px;
            height: calc(min(375px, 65vw)*.31);
            border: 2px solid rgba(249, 168, 212, .7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1rem, 3.6vw, 1.5rem);
            color: #ec4899;
            font-weight: 700;
        }

        .env-scene.opened .env-letter {
            transform: translateX(-50%) translateY(-70%);
        }

        .tap-hint {
            font-size: clamp(.85rem, 3vw, 1.1rem);
            color: #be185d;
            font-weight: 600;
            text-align: center;
            animation: hintPop 2.3s infinite;
        }

        /* ═══ WISH OVERLAY ═══ */
        .wish-overlay {
            position: fixed;
            inset: 0;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            pointer-events: none;
            opacity: 0;
            transition: opacity .4s;
        }

        .wish-overlay.show {
            pointer-events: auto;
            opacity: 1;
        }

        .wish-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(253, 232, 245, 0.85);
            backdrop-filter: blur(20px);
        }

        .wish-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 30px;
            padding: 40px 30px;
            border: 2px solid #f9a8d4;
            text-align: center;
            transform: translateY(50px) scale(0.9);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .wish-overlay.show .wish-card {
            transform: translateY(0) scale(1);
        }

        .date-badge {
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f472b6, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            display: block;
        }

        .wish-body {
            font-size: 1.3rem;
            color: #5b21b6;
            line-height: 1.8;
            font-weight: 600;
            margin: 20px 0;
        }

        .wish-sig {
            font-family: 'Dancing Script', cursive;
            font-size: 1.3rem;
            color: #be185d;
            font-weight: 700;
        }

        .btn-close {
            margin-top: 25px;
            background: linear-gradient(135deg, #f9a8d4, #e879c0);
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 50px;
            font-weight: 700;
            font-family: 'Baloo 2', cursive;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(232, 121, 192, 0.4);
        }

        /* Animations */
        @keyframes floatBob {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        @keyframes sealBeat {

            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                transform: translate(-50%, -50%) scale(1.2);
            }
        }

        @keyframes hintPop {

            0%,
            100% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }
        }
    </style>
</head>

                faceapi.nets.tinyFaceDetector.loadFromUri(URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(URL),
                faceapi.nets.faceExpressionNet.loadFromUri(URL)
            ]);
            modelsLoaded = true;
            aiStatus.textContent = "✅ AI đã sẵn sàng!";
            setTimeout(() => aiStatus.style.opacity = '0', 2000);
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                video.srcObject = stream;
                aiBtn.style.display = 'none';
                aiStatus.style.opacity = '1';
                aiStatus.textContent = "🔍 Đang tìm khuôn mặt...";
                detect();
            } catch (err) { alert("Hãy cấp quyền Camera để AI có thể nhìn thấy nụ cười của bạn nhé!"); }
        }

        async function detect() {
            if (opened) return;
            const det = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceExpressions().withFaceDescriptor();
            if (det) {
                aiStatus.textContent = "🌸 Thấy bạn rồi! Mỉm cười để mở nhé...";
                if (det.expressions.happy > 0.8) handleOpen(det.descriptor);
            } else { aiStatus.textContent = "🔍 Đang tìm khuôn mặt..."; }
            if (!opened) requestAnimationFrame(detect);
        }

        function handleOpen(descriptor) {
            if (opened) return;
            const currentDesc = Array.from(descriptor);
            let wishIdx = -1;
            for (const id in faceWishes) {
                const dist = Math.sqrt(currentDesc.map((v, i) => Math.pow(v - faceWishes[id].descriptor[i], 2)).reduce((a, b) => a + b));
                if (dist < 0.5) { wishIdx = faceWishes[id].idx; break; }
            }
            if (wishIdx === -1) {
                wishIdx = Math.floor(Math.random() * WISHES.length);
                faceWishes[Date.now()] = { descriptor: currentDesc, idx: wishIdx };
                localStorage.setItem(LS_KEY, JSON.stringify(faceWishes));
            }
            openLetter(WISHES[wishIdx]);
        }

        function openLetter(wish) {
            opened = true;
            scene.classList.add('opened');
            setTimeout(() => {
                burst();
                bodyEl.textContent = wish;
                overlay.classList.add('show');
                const tts = new SpeechSynthesisUtterance(wish);
                tts.lang = 'vi-VN';
                window.speechSynthesis.speak(tts);
            }, 700);
        }

        aiBtn.addEventListener('click', async () => {
            await loadModels();
            await startCamera();
            window.speechSynthesis.speak(new SpeechSynthesisUtterance("")); // Unlock audio
        });
        scene.addEventListener('click', () => openLetter(WISHES[Math.floor(Math.random() * WISHES.length)]));
        document.getElementById('btnClose').addEventListener('click', () => {
            overlay.classList.remove('show');
            setTimeout(() => { opened = false; scene.classList.remove('opened'); if (!aiBtn.style.display) startCamera(); else detect(); }, 500);
        });

        /* Particles */
        const cv = document.getElementById('bg'), cx = cv.getContext('2d');
        let W, H, parts = [];
        function resize() { W = cv.width = innerWidth; H = cv.height = innerHeight; }
        resize(); addEventListener('resize', resize);
        class P {
            constructor(b = false) {
                this.b = b; this.x = b ? W / 2 : Math.random() * W; this.y = b ? H * 0.5 : -20;
                this.vx = (Math.random() - 0.5) * (b ? 10 : 1); this.vy = b ? -(Math.random() * 10 + 5) : Math.random() * 2 + 1;
                this.c = ['🌸', '✨', '💕', '🌷'][Math.floor(Math.random() * 4)]; this.sz = Math.random() * 15 + 10;
                this.age = 0; this.life = b ? 100 : Infinity;
            }
            tick() {
                this.x += this.vx; this.y += this.vy; this.age++;
                if (this.b) this.vy += 0.2;
                if (!this.b && this.y > H) this.y = -20;
                return this.b && this.age > this.life;
            }
            draw() { cx.font = this.sz + 'px serif'; cx.fillText(this.c, this.x, this.y); }
        }
        function burst() { for (let i = 0; i < 30; i++) parts.push(new P(true)); }
        for (let i = 0; i < 30; i++) parts.push(new P());
        (function loop() { cx.clearRect(0, 0, W, H); parts = parts.filter(p => !p.tick()); parts.forEach(p => p.draw()); requestAnimationFrame(loop); })();
    </script>
</body>

</html>
