<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1,viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#fde8f5" />
    <title>8/3 AI – 11A5 💖 Vision & Hands</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Dancing+Script:wght@600;700&display=swap"
        rel="stylesheet" />
    <style>
        /* ═══ RESET ═══ */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
        }

        body {
            font-family: 'Baloo 2', cursive;
            background: radial-gradient(ellipse 120% 100% at 50% 0%, #fde8f5 0%, #fef3fb 45%, #f5f0ff 80%, #fef9ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: 100svh;
        }

        #bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        /* ═══ AI UI ═══ */
        #aiStatus {
            position: fixed;
            top: env(safe-area-inset-top, 20px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            padding: 10px 22px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #be185d;
            box-shadow: 0 8px 30px rgba(190, 24, 93, 0.15);
            border: 2px solid #fbcfe8;
            transition: all 0.3s;
            text-align: center;
            font-weight: 700;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 8px;
            width: max-content;
        }

        .ai-pulse {
            width: 8px;
            height: 8px;
            background: #be185d;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.8);
                opacity: 1;
            }

            100% {
                transform: scale(2.4);
                opacity: 0;
            }
        }

        video#video {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 40px;
            height: 40px;
            opacity: 0.1;
            pointer-events: none;
            z-index: -1;
        }

        /* ═══ ENV WRAP ═══ */
        #envWrap {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .env-label {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.4rem, 6vw, 2.5rem);
            font-weight: 700;
            color: #db2777;
            text-align: center;
            max-width: 90vw;
            line-height: 1.2;
        }

        .env-scene {
            perspective: 1000px;
            cursor: pointer;
            animation: floatBob 5s ease-in-out infinite;
            transition: filter .2s;
        }

        .env-scene.opened {
            animation: none;
            pointer-events: none;
        }

        .env-box {
            position: relative;
            width: min(540px, 86vw);
            height: min(375px, 60vw);
        }

        .env-body {
            position: absolute;
            inset: 0;
            background: linear-gradient(160deg, #fff8fd 0%, #ffe8f7 55%, #ffd8f0 100%);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(244, 114, 182, .3);
            overflow: hidden;
        }

        .env-body::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            border-left: calc(min(540px, 86vw)/2) solid #f5abd8;
            border-right: calc(min(540px, 86vw)/2) solid #f5abd8;
            border-top: calc(min(375px, 60vw)*.44) solid transparent;
        }

        .env-left {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            border-left: calc(min(540px, 86vw)*.35) solid #f9bde3;
            border-top: calc(min(375px, 60vw)/2) solid transparent;
            border-bottom: calc(min(375px, 60vw)/2) solid transparent;
        }

        .env-right {
            position: absolute;
            top: 0;
            right: 0;
            height: 100%;
            border-right: calc(min(540px, 86vw)*.35) solid #f9bde3;
            border-top: calc(min(375px, 60vw)/2) solid transparent;
            border-bottom: calc(min(375px, 60vw)/2) solid transparent;
        }

        .env-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            transform-origin: top center;
            transition: transform .8s cubic-bezier(.4, 0, .2, 1);
            z-index: 6;
        }

        .env-flap svg {
            display: block;
            width: 100%;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
        }

        .env-scene.opened .env-flap {
            transform: rotateX(-180deg);
        }

        .seal {
            position: absolute;
            top: 52%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.5rem;
            z-index: 7;
            animation: sealBeat 2s infinite;
        }

        .env-scene.opened .seal {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0);
            transition: 0.4s;
        }

        .env-letter {
            position: absolute;
            bottom: 10%;
            left: 50%;
            width: 75%;
            transform: translateX(-50%);
            z-index: 4;
            transition: transform .7s .1s cubic-bezier(.2, 1, .3, 1);
        }

        .env-letter-inner {
            background: #fff;
            border-radius: 10px;
            height: calc(min(375px, 60vw)*.35);
            border: 2px solid #f9a8d4;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #ec4899;
            font-weight: 800;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .env-scene.opened .env-letter {
            transform: translateX(-50%) translateY(-65%);
        }

        .tap-hint {
            font-size: 0.9rem;
            color: #be185d;
            font-weight: 700;
            text-align: center;
            animation: pulseFade 2s infinite;
        }

        #debugHint {
            position: fixed;
            bottom: 20px;
            font-size: 0.7rem;
            color: #9d174d;
            opacity: 0.6;
            pointer-events: none;
        }

        /* ═══ WISH OVERLAY ═══ */
        .wish-overlay {
            position: fixed;
            inset: 0;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            pointer-events: none;
            opacity: 0;
            transition: opacity .4s;
        }

        .wish-overlay.show {
            pointer-events: auto;
            opacity: 1;
        }

        .wish-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(253, 232, 245, 0.9);
            backdrop-filter: blur(15px);
        }

        .wish-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 480px;
            background: white;
            border-radius: 35px;
            padding: 45px 30px;
            border: 3px solid #f9a8d4;
            text-align: center;
            transform: scale(0.85) translateY(40px);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 25px 80px rgba(190, 24, 93, 0.2);
        }

        .wish-overlay.show .wish-card {
            transform: scale(1) translateY(0);
        }

        .date-badge {
            font-family: 'Dancing Script', cursive;
            font-size: 3.8rem;
            font-weight: 700;
            color: #db2777;
            margin-bottom: 5px;
            display: block;
        }

        .wish-body {
            font-size: 1.35rem;
            color: #4c1d95;
            line-height: 1.7;
            font-weight: 700;
            margin: 20px 0;
        }

        .wish-sig {
            font-family: 'Dancing Script', cursive;
            font-size: 1.3rem;
            color: #be185d;
            font-weight: 700;
        }

        .btn-close {
            margin-top: 30px;
            background: linear-gradient(135deg, #f9a8d4 0%, #db2777 100%);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 50px;
            font-weight: 800;
            font-family: 'Baloo 2', cursive;
            cursor: pointer;
            font-size: 1.1rem;
        }

        @keyframes floatBob {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        @keyframes sealBeat {

            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                transform: translate(-50%, -50%) scale(1.15);
            }
        }

        @keyframes pulseFade {

            0%,
            100% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>

            "Hãy cứ mỉm cười và cả thế giới sẽ mỉm cười lại với bạn. Chúc mừng ngày 8/3! 😄",

        const LS_KEY = 'face_wish_map_11a5';
        let faceWishes = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
        let opened = false, processing = false;
        const video = document.getElementById('video'), aiStatus = document.getElementById('aiStatus'), statusSpan = aiStatus.querySelector('span');

        // Step 1: Hand Detection Setup (MediaPipe)
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 0, // Back to 0 for maximum speed on mobile
            minDetectionConfidence: 0.55,
            minTrackingConfidence: 0.55
        });
        hands.onResults((results) => {
            if (opened || processing) return;
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                processing = true;
                statusSpan.textContent = "🖐️ Đã thấy tay! Mở thư ngay...";
                handleMatch(null);
            }
        });

        // Step 2: Initialize
        window.addEventListener('load', async () => {
            statusSpan.textContent = "⏳ Đang chuẩn bị AI...";
            await loadAI();
            startCamera();
        });

        async function loadAI() {
            const F_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
            try {
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(F_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(F_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(F_URL)
                ]);
                statusSpan.textContent = "Tìm kiếm Bạn nữ Xinh Đẹp 11A5!";
            } catch (e) { statusSpan.textContent = "⚠️ Lỗi 11A5."; }
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 480 }, height: { ideal: 480 } }
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    statusSpan.textContent = "🔍 Đang rà soát...";
                    requestAnimationFrame(aiLoop);
                };
            } catch (err) {
                statusSpan.textContent = "⚠️ Cần cấp quyền Camera!";
            }
        }

        document.body.addEventListener('click', () => { if (video.paused) video.play(); }, { once: true });

        // Step 3: High-Performance Multi-AI Tracking Loop
        let faceDetectCount = 0;
        let lastTimestamp = 0;
        let frameCount = 0;
        let isAiWorkinging = false;

        async function aiLoop(timestamp) {
            if (opened || processing) return;
            if (video.readyState < 2) { requestAnimationFrame(aiLoop); return; }

            frameCount++;
            // Optimization: Only run AI every 3 frames (~20 times per second) 
            // to keep the UI smooth at 60fps
            if (frameCount % 3 === 0 && !isAiWorkinging) {
                isAiWorkinging = true;

                // Run Hand & Face in parallel but don't block the next frame
                (async () => {
                    try {
                        // Parallel hand & face
                        const handTask = hands.send({ image: video });
                        const faceTask = faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({
                            inputSize: 128,
                            scoreThreshold: 0.4
                        })).withFaceLandmarks().withFaceDescriptor();

                        const [_, det] = await Promise.all([handTask, faceTask]);

                        if (det && !opened && !processing) {
                            processing = true;
                            statusSpan.textContent = "✨ Thấy mặt bạn rồi! Mở thư...";
                            handleMatch(det.descriptor);
                        }
                    } catch (e) { } finally {
                        isAiWorkinging = false;
                    }
                })();
            }

            requestAnimationFrame(aiLoop);
        }

        function handleMatch(descriptor) {
            let wishIdx = -1;
            if (descriptor) {
                const currentDesc = Array.from(descriptor);
                for (const id in faceWishes) {
                    const stored = faceWishes[id].descriptor;
                    const dist = Math.sqrt(currentDesc.reduce((sum, val, i) => sum + Math.pow(val - stored[i], 2), 0));
                    if (dist < 0.7) { wishIdx = faceWishes[id].idx; break; }
                }
                if (wishIdx === -1) {
                    wishIdx = Math.floor(Math.random() * WISHES.length);
                    faceWishes[Date.now()] = { descriptor: currentDesc, idx: wishIdx };
                    localStorage.setItem(LS_KEY, JSON.stringify(faceWishes));
                }
            } else {
                wishIdx = Math.floor(Math.random() * WISHES.length);
            }
            showWish(WISHES[wishIdx]);
        }

        function showWish(wish) {
            opened = true;
            document.getElementById('envScene').classList.add('opened');
            aiStatus.style.opacity = '0';
            setTimeout(() => {
                burst();
                document.getElementById('wishBodyEl').textContent = wish;
                document.getElementById('wishOverlay').classList.add('show');
            }, 700);
        }

        document.getElementById('btnClose').addEventListener('click', () => {
            document.getElementById('wishOverlay').classList.remove('show');
            setTimeout(() => {
                opened = false; processing = false;
                document.getElementById('envScene').classList.remove('opened');
                aiStatus.style.opacity = '1';
                statusSpan.textContent = "🔍 Đang tìm nữ xinh 11A5...";
                aiLoop();
            }, 500);
        });

        document.getElementById('envScene').addEventListener('click', () => {
            if (!opened) showWish(WISHES[Math.floor(Math.random() * WISHES.length)]);
        });

        /* Particles */
        const cv = document.getElementById('bg'), cx = cv.getContext('2d');
        let W, H, parts = [];
        function resize() { W = cv.width = innerWidth; H = cv.height = innerHeight; }
        resize(); addEventListener('resize', resize);
        class P {
            constructor(b = false) {
                this.b = b; this.x = b ? W / 2 : Math.random() * W; this.y = b ? H * 0.5 : -20;
                this.vx = (Math.random() - 0.5) * (b ? 14 : 1.2); this.vy = b ? -(Math.random() * 12 + 6) : Math.random() * 2 + 1;
                this.c = ['🌸', '✨', '💕', '🌷', '🎀', '💖'][Math.floor(Math.random() * 6)]; this.sz = Math.random() * 15 + 15;
                this.age = 0; this.life = b ? 100 : Infinity;
            }
            tick() {
                this.x += this.vx; this.y += this.vy; this.age++;
                if (this.b) this.vy += 0.25;
                if (!this.b && this.y > H) this.y = -20;
                return this.b && this.age > this.life;
            }
            draw() { cx.font = this.sz + 'px serif'; cx.fillText(this.c, this.x, this.y); }
        }
        function burst() { for (let i = 0; i < 50; i++) parts.push(new P(true)); }
        for (let i = 0; i < 30; i++) parts.push(new P());
        (function loop() { cx.clearRect(0, 0, W, H); parts = parts.filter(p => !p.tick()); parts.forEach(p => p.draw()); requestAnimationFrame(loop); })();
    </script>
</body>
